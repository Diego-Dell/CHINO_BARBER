<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activar Barber School</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 50%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f0f0f0;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
      text-align: center;
    }

    .logo-wrap {
      margin-bottom: 20px;
    }
    .logo-wrap img {
      width: 90px;
      height: 90px;
      object-fit: contain;
      border-radius: 16px;
    }
    .logo-placeholder {
      width: 90px;
      height: 90px;
      background: linear-gradient(135deg, #c8a96e, #f0d08a);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #f0d08a;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }
    .subtitle {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.45);
      margin-bottom: 32px;
    }

    label {
      display: block;
      text-align: left;
      font-size: 0.8rem;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      margin-bottom: 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      font-family: "Courier New", monospace;
      letter-spacing: 2px;
      text-transform: uppercase;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input::placeholder { color: rgba(255,255,255,0.25); letter-spacing: 1px; text-transform: none; font-family: inherit; }
    input:focus {
      border-color: #c8a96e;
      box-shadow: 0 0 0 3px rgba(200,169,110,0.2);
    }

    button {
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      background: linear-gradient(135deg, #c8a96e, #f0d08a);
      color: #1a1a1a;
      font-size: 0.95rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }
    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .msg {
      margin-top: 14px;
      font-size: 0.85rem;
      min-height: 22px;
      border-radius: 8px;
      padding: 8px 14px;
      display: none;
    }
    .msg.error { background: rgba(220,53,69,0.15); color: #ff8a8a; display: block; }
    .msg.ok    { background: rgba(25,135,84,0.15);  color: #7ddd9f;  display: block; }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.08);
      margin: 28px 0 20px;
    }

    .support {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.35);
      line-height: 1.7;
    }
    .support strong { color: rgba(255,255,255,0.6); }
    .support a { color: #c8a96e; text-decoration: none; }
    .support a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="assets/img/FONDO CLARO.png" alt="Barber School" onerror="this.style.display='none'; document.getElementById('logoEmoji').style.display='inline-flex'">
      <div class="logo-placeholder" id="logoEmoji" style="display:none">✂️</div>
    </div>

    <h1>Barber School</h1>
    <p class="subtitle">Sistema de Gestión Profesional</p>

    <label for="keyInput">Clave de activación</label>
    <input
      id="keyInput"
      type="text"
      placeholder="BS-XXXX-XXXX-XXXX"
      maxlength="19"
      autocomplete="off"
      spellcheck="false"
    />

    <button id="btnActivar">Activar sistema</button>

    <div class="msg" id="msgActivacion"></div>

    <hr class="divider" />

    <div class="support">
      ¿No tenés tu clave de activación?<br />
      Contactá al soporte para obtenerla:<br /><br />
      <strong>Diego Dell</strong><br />
      <a href="#">+591 78487255</a>
    </div>
  </div>

  <script>
    const input = document.getElementById("keyInput");
    const btn   = document.getElementById("btnActivar");
    const msg   = document.getElementById("msgActivacion");

    // Auto-format: BS-XXXX-XXXX-XXXX
    input.addEventListener("input", () => {
      let v = input.value.replace(/[^a-zA-Z0-9]/g, "").toUpperCase();
      if (v.length > 2)  v = v.slice(0,2)  + "-" + v.slice(2);
      if (v.length > 7)  v = v.slice(0,7)  + "-" + v.slice(7);
      if (v.length > 12) v = v.slice(0,12) + "-" + v.slice(12);
      if (v.length > 17) v = v.slice(0,17);
      input.value = v;
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") btn.click();
    });

    btn.addEventListener("click", async () => {
      const key = input.value.trim();
      if (!key) {
        showMsg("Ingresá tu clave de activación.", "error");
        return;
      }
      btn.disabled = true;
      btn.textContent = "Verificando…";
      try {
        const res = await fetch("/api/license/activate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ key }),
        });
        const data = await res.json();
        if (data.ok) {
          showMsg("✅ ¡Activación exitosa! Iniciando…", "ok");
          setTimeout(() => { window.location.href = "/index.html"; }, 1400);
        } else {
          showMsg(data.error || "Clave inválida.", "error");
          btn.disabled = false;
          btn.textContent = "Activar sistema";
        }
      } catch (_) {
        showMsg("Error de conexión. Reiniciá la app.", "error");
        btn.disabled = false;
        btn.textContent = "Activar sistema";
      }
    });

    function showMsg(text, type) {
      msg.textContent = text;
      msg.className = "msg " + type;
    }


  </script>
</body>
</html>
